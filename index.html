<style>
:root{
  --bg:#0d0d0d;
  --gold:#C9A84C;
  --gold-deep:#a8842f;
  --champ:#E8D5B0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--champ);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px 24px;
  position:relative;
  overflow-x:hidden;
}
/* Viñeta del fondo (el destello dorado va anclado al logo, ver .brand::before) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(120% 120% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.7) 100%);
  pointer-events:none;
  z-index:0;
}
.wrap{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  max-width:560px;
  width:100%;
}

/* Logo dorado (PNG horneado) con destello anclado, siempre concéntrico */
.brand{margin:0;position:relative}
.brand::before{
  content:"";
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:165%;height:140%;
  background:radial-gradient(closest-side, rgba(201,168,76,.17), rgba(201,168,76,0) 72%);
  z-index:-1;
  pointer-events:none;
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.logo{display:block;width:min(62vw,280px);height:auto;filter:drop-shadow(0 6px 26px rgba(201,168,76,.20))}

/* Separador con rombo central */
.rule{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  width:min(72vw,300px);
  margin:14px 0 10px;
}
.rule::before,.rule::after{
  content:"";
  height:1px;
  flex:1;
  background:linear-gradient(90deg,transparent,var(--gold));
}
.rule::after{background:linear-gradient(90deg,var(--gold),transparent)}
.rule i{
  width:7px;height:7px;
  transform:rotate(45deg);
  background:var(--gold);
  flex:none;
}

.soon{
  font-family:'Cinzel',serif;
  font-weight:500;
  font-size:clamp(2rem,9vw,3.2rem);
  letter-spacing:.04em;
  color:var(--gold);
  line-height:1.1;
}
.tagline{
  font-weight:300;
  font-size:clamp(.95rem,4.2vw,1.18rem);
  letter-spacing:.02em;
  color:var(--champ);
  margin-top:8px;
  max-width:24ch;
}
.services{
  font-weight:400;
  font-size:clamp(.66rem,3vw,.78rem);
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(232,213,176,.62);
  margin-top:10px;
  line-height:1.9;
}
.services b{color:var(--gold);font-weight:500}

/* Botón WhatsApp */
.wa{
  display:inline-flex;
  align-items:center;
  gap:11px;
  margin-top:20px;
  padding:15px 30px;
  border-radius:50px;
  background:linear-gradient(135deg,var(--champ),var(--gold) 55%,var(--gold-deep));
  color:#1a1206;
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  font-size:1rem;
  letter-spacing:.02em;
  text-decoration:none;
  box-shadow:0 8px 30px rgba(201,168,76,.28);
  transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
}
.wa svg{width:21px;height:21px;flex:none}
.wa:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(201,168,76,.42);filter:brightness(1.05)}
.wa:active{transform:translateY(0)}
.wa:focus-visible{outline:2px solid var(--champ);outline-offset:4px}

.foot{
  margin-top:14px;
  font-weight:300;
  font-size:.82rem;
  letter-spacing:.04em;
  color:rgba(232,213,176,.5);
}
.foot svg{width:13px;height:13px;vertical-align:-2px;margin-right:5px;opacity:.8}

/* Aparición escalonada */
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.an{opacity:0;animation:rise .9s cubic-bezier(.22,.61,.36,1) forwards}
.d1{animation-delay:.05s}
.d2{animation-delay:.35s}
.d3{animation-delay:.55s}
.d4{animation-delay:.75s}
.d5{animation-delay:.95s}
.d6{animation-delay:1.15s}

@media (max-height:720px){
  .logo{width:min(50vw,200px)}
}
@media (prefers-reduced-motion:reduce){
  .an{animation:none;opacity:1}
  .wa{transition:none}
}
</style>
